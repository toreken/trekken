<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トレケン | トレンド研究所</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Noto Sans JP', sans-serif;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
      margin-bottom: 20px;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 3px solid #7c6ceb;
      object-fit: cover;
      background: #111;
      margin: 0 auto 14px;
      display: block;
    }

    .name {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      background: #7c6ceb;
      color: #fff;
      font-size: 11px;
      font-weight: 400;
      padding: 4px 12px;
      border-radius: 16px;
      margin-bottom: 14px;
    }

    .bio {
      font-size: 13px;
      line-height: 1.7;
      color: #555;
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto 16px;
      text-align: left;
    }

    .social-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 400;
      color: #fff;
      transition: transform 0.2s;
    }

    .social-btn:hover { transform: translateY(-2px); }
    .social-btn svg { width: 14px; height: 14px; }

    .sb-x { background: #1a1a2e; }
    .sb-yt { background: #ff0000; }
    .sb-note { background: #41c9b4; }

    /* 検索エリア */
    .search-area {
      margin-top: 8px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .search-box {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      border: 2px solid #e0dcff;
      border-radius: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: #7c6ceb; }

    /* タブ */
    .tabs {
      display: flex;
      gap: 4px;
      margin-top: 14px;
      border-bottom: 2px solid #eee;
      overflow-x: auto;
    }

    .tab {
      padding: 10px 14px;
      font-size: 13px;
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active {
      color: #7c6ceb;
      border-bottom-color: #7c6ceb;
      font-weight: 700;
    }

    /* 銘柄リスト */
    .symbol-list {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 6px;
      max-height: 240px;
      overflow-y: auto;
      padding: 4px;
    }

    .symbol-chip {
      padding: 8px 6px;
      background: #f3f0ff;
      border: 1px solid #e0dcff;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #1a1a2e;
      transition: background 0.15s, transform 0.15s;
      user-select: none;
    }

    .symbol-chip:hover {
      background: #7c6ceb;
      color: #fff;
      transform: translateY(-1px);
    }

    .symbol-chip.active {
      background: #7c6ceb;
      color: #fff;
    }

    .no-result {
      grid-column: 1 / -1;
      padding: 20px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }

    .count-info {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
      text-align: right;
    }

    /* チャート表示エリア */
    .chart-area {
      width: 100%;
      max-width: 1280px;
      display: none;
      margin-bottom: 20px;
      gap: 12px;
    }

    .chart-area.active {
      display: flex;
      flex-wrap: wrap;
    }

    .chart-main {
      flex: 1 1 600px;
      background: #131722;
      border-radius: 12px;
      overflow: hidden;
      min-width: 0;
    }

    .info-panel {
      flex: 0 1 280px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 240px;
    }

    .info-card {
      background: #1e2230;
      border-radius: 12px;
      padding: 14px 16px;
      color: #e6e9f0;
    }

    .info-card-title {
      font-size: 12px;
      font-weight: 700;
      color: #a0a8b8;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .info-card-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .info-card-title-row .info-card-title {
      margin-bottom: 0;
    }

    .compare-btn {
      background: #7c6ceb;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .compare-btn:hover { background: #6754d4; }
    .compare-btn:disabled { background: #555; cursor: not-allowed; }

    .chart-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-action {
      background: rgba(124, 108, 235, 0.25);
      color: #fff;
      border: 1px solid rgba(124, 108, 235, 0.5);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      white-space: nowrap;
    }

    .chart-action:hover { background: rgba(124, 108, 235, 0.5); }

    .peer-color-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .commentary-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
    }

    .commentary-list li {
      padding: 4px 0;
    }

    .peer-sector-name {
      font-size: 11px;
      color: #888fa0;
      margin-bottom: 8px;
    }

    .peer-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
    }

    .peer-list li {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .peer-list li:last-child { border-bottom: none; }

    .peer-name {
      font-weight: 700;
      cursor: pointer;
      color: #cdd5e3;
    }

    .peer-name:hover { color: #7c6ceb; }

    .peer-change {
      font-weight: 700;
    }

    .peer-up { color: #32cd32; }
    .peer-down { color: #ff4444; }
    .peer-na { color: #666; }

    .info-empty {
      font-size: 12px;
      color: #777;
      padding: 8px 0;
    }

    .chart-header {
      padding: 12px 18px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      background: #1e2230;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chart-close {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
    }

    .chart-close:hover { background: rgba(255,255,255,0.25); }

    .chart-body {
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chart-body img { width: 100%; display: block; }

    .chart-loading {
      padding: 40px;
      color: #888;
      font-size: 13px;
    }

    .chart-error {
      padding: 30px;
      color: #ff4444;
      font-size: 13px;
    }

    .footer {
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
    }
  </style>
</head>

    function renderSymbolList() {
      const list = document.getElementById('symbolList');
      const countInfo = document.getElementById('countInfo');
      const symbols = GROUPS[currentGroup] || [];
      const q = currentQuery.trim().toUpperCase();
      const filtered = q ? symbols.filter(s => s.toUpperCase().includes(q)) : symbols;

      list.innerHTML = '';
      if (filtered.length === 0) {
        const div = document.createElement('div');
        div.className = 'no-result';
        div.textContent = '該当する銘柄がありません';
        list.appendChild(div);
      } else {
        filtered.forEach(sym => {
          const chip = document.createElement('div');
          chip.className = 'symbol-chip' + (sym === activeSymbol ? ' active' : '');
          chip.textContent = sym;
          chip.onclick = () => loadChart(sym);
          list.appendChild(chip);
        });
      }
      countInfo.textContent = `${filtered.length} / ${symbols.length} 銘柄`;
    }

    async function loadChart(sym) {
      activeSymbol = sym;
      compareMode = false;
      lastChartImage = null;
      lastPeerSymbols = [];
      renderSymbolList();

      const area = document.getElementById('chartArea');
      const title = document.getElementById('chartTitle');
      const body = document.getElementById('chartBody');
      const commentaryList = document.getElementById('commentaryList');
      const peerSectorName = document.getElementById('peerSectorName');
      const peerList = document.getElementById('peerList');
      const compareBtn = document.getElementById('compareBtn');
      const restoreBtn = document.getElementById('restoreBtn');

      area.classList.add('active');
      title.textContent = `📈 ${sym}`;
      body.innerHTML = '<div class="chart-loading">データ取得中...</div>';
      commentaryList.innerHTML = '<li class="info-empty">読み込み中...</li>';
      peerSectorName.textContent = '';
      peerList.innerHTML = '<li class="info-empty">読み込み中...</li>';
      compareBtn.style.display = 'none';
      restoreBtn.style.display = 'none';

      // チャートエリアまでスクロール
      setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);

      // チャートと情報を並行取得
      const chartPromise = fetch(`/chart/${encodeURIComponent(sym)}`)
        .then(r => r.json())
        .then(data => {
          if (data.image) {
            lastChartImage = data.image;
            body.innerHTML = `<img src="data:image/png;base64,${data.image}" alt="${sym}チャート">`;
          } else {
            body.innerHTML = `<div class="chart-error">⚠️ ${data.error || '取得失敗'}</div>`;
          }
        })
        .catch(() => {
          body.innerHTML = '<div class="chart-error">⚠️ サーバーに接続できません</div>';
        });

      const infoPromise = fetch(`/info/${encodeURIComponent(sym)}`)
        .then(r => r.json())
        .then(data => {
          // トレンド解説
          if (Array.isArray(data.commentary) && data.commentary.length > 0) {
            commentaryList.innerHTML = data.commentary.map(line => `<li>${escapeHtml(line)}</li>`).join('');
          } else {
            commentaryList.innerHTML = '<li class="info-empty">解説を生成できませんでした</li>';
          }

          // 同業他社
          if (data.peers && Array.isArray(data.peers.peers) && data.peers.peers.length > 0) {
            peerSectorName.textContent = data.peers.sector;
            peerList.innerHTML = data.peers.peers.map(p => {
              const ch = p.change;
              let cls = 'peer-na', label = '—';
              if (ch !== null && ch !== undefined) {
                cls = ch >= 0 ? 'peer-up' : 'peer-down';
                label = (ch >= 0 ? '+' : '') + ch.toFixed(2) + '%';
              }
              return `<li><span class="peer-name" onclick="loadChart('${p.symbol}')">${escapeHtml(p.symbol)}</span><span class="peer-change ${cls}">${label}</span></li>`;
            }).join('');
            // 比較ボタン用の銘柄リスト保存（自分＋同業）
            lastPeerSymbols = [sym, ...data.peers.peers.map(p => p.symbol)];
            compareBtn.style.display = 'inline-block';
          } else {
            peerSectorName.textContent = '';
            peerList.innerHTML = '<li class="info-empty">同業他社情報なし（S&P 500外の銘柄）</li>';
            lastPeerSymbols = [];
          }
        })
        .catch(() => {
          commentaryList.innerHTML = '<li class="info-empty">情報を取得できません</li>';
          peerList.innerHTML = '<li class="info-empty">情報を取得できません</li>';
        });

      await Promise.all([chartPromise, infoPromise]);
    }

    async function runCompare() {
      if (!lastPeerSymbols || lastPeerSymbols.length < 2) return;
      const body = document.getElementById('chartBody');
      const title = document.getElementById('chartTitle');
      const peerList = document.getElementById('peerList');
      const restoreBtn = document.getElementById('restoreBtn');
      const compareBtn = document.getElementById('compareBtn');

      compareMode = true;
      title.textContent = `📊 ${activeSymbol} と同業他社の比較`;
      body.innerHTML = '<div class="chart-loading">比較チャートを作成中...</div>';
      compareBtn.disabled = true;

      try {
        const url = '/compare?symbols=' + encodeURIComponent(lastPeerSymbols.join(','));
        const res = await fetch(url);
        const data = await res.json();
        if (data.image) {
          body.innerHTML = `<img src="data:image/png;base64,${data.image}" alt="比較チャート">`;
          // 同業他社リストに色の丸を追加
          if (Array.isArray(data.legend)) {
            const colorMap = {};
            data.legend.forEach(it => { colorMap[it.symbol] = it.color; });
            peerList.querySelectorAll('li').forEach(li => {
              const nameEl = li.querySelector('.peer-name');
              if (!nameEl) return;
              const symName = nameEl.textContent.trim();
              if (colorMap[symName] && !li.querySelector('.peer-color-dot')) {
                const dot = document.createElement('span');
                dot.className = 'peer-color-dot';
                dot.style.background = colorMap[symName];
                nameEl.prepend(dot);
              }
            });
          }
          restoreBtn.style.display = 'inline-block';
        } else {
          body.innerHTML = `<div class="chart-error">⚠️ ${data.error || '比較失敗'}</div>`;
        }
      } catch (e) {
        body.innerHTML = '<div class="chart-error">⚠️ サーバーに接続できません</div>';
      } finally {
        compareBtn.disabled = false;
      }
    }

    function restoreSingleChart() {
      if (!lastChartImage || !activeSymbol) return;
      const body = document.getElementById('chartBody');
      const title = document.getElementById('chartTitle');
      const peerList = document.getElementById('peerList');
      const restoreBtn = document.getElementById('restoreBtn');

      compareMode = false;
      title.textContent = `📈 ${activeSymbol}`;
      body.innerHTML = `<img src="data:image/png;base64,${lastChartImage}" alt="${activeSymbol}チャート">`;
      // 色の丸を削除
      peerList.querySelectorAll('.peer-color-dot').forEach(d => d.remove());
      restoreBtn.style.display = 'none';
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    function closeChart() {
      document.getElementById('chartArea').classList.remove('active');
      activeSymbol = null;
      renderSymbolList();
    }

    // タブ切替
    document.querySelectorAll('.tab').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGroup = btn.dataset.group;
        renderSymbolList();
      };
    });

    // 検索ボックス
    document.getElementById('searchBox').addEventListener('input', e => {
      currentQuery = e.target.value;
      renderSymbolList();
    });

    // 初期描画
    renderSymbolList();
  </script>
</body>
</html>
